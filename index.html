<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Monthly Prize Scratch Cards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f9f9f9;
      padding: 10px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 20px;
    }

    .scratch-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 15px;
      margin-top: 15px;
      justify-items: center;
    }

    .card-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .card {
      position: relative;
      width: 100%;
      aspect-ratio: 2 / 1.3;
      max-width: 150px;
      background: orange;
      background-image: linear-gradient(45deg, #f90 25%, transparent 25%),
                        linear-gradient(-45deg, #f90 25%, transparent 25%),
                        linear-gradient(45deg, transparent 75%, #f90 75%),
                        linear-gradient(-45deg, transparent 75%, #f90 75%);
      background-size: 20px 20px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: bold;
      color: black;
      user-select: none;
      text-align: center;
      padding: 5px;
      transition: background 0.5s, color 0.5s, opacity 0.5s;
      opacity: 1;
    }

    .hidden-text {
      visibility: hidden;
    }

    .revealed .hidden-text {
      visibility: visible;
    }

    .number {
      position: absolute;
      top: 5px;
      left: 5px;
      background: White;
      color: black;
      font-size: 12px;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      line-height: 20px;
    }

    .winner-name {
      margin-top: 6px;
      width: 100%;
      max-width: 150px;
      padding: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    .buttons {
      margin-top: 20px;
    }

    button {
      margin: 5px;
      padding: 10px 16px;
      font-size: 15px;
      border: none;
      border-radius: 5px;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 18px;
      }
      .card {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

<h1 style="text-align: center; margin: 0.4em 0;">
  MALLU CHIT<br>
  <span style="font-size: 0.72em; color: #555; font-weight: normal;">
    March 2026 – March 2027
  </span>
</h1>
<p>Tap each card 3 times to reveal the month, then enter the winner's name</p>

<div class="scratch-container" id="scratchContainer">
  <!-- Cards will be created dynamically -->
</div>

<div class="buttons">
  <button onclick="resetCards()">Reset All Cards</button>
  <button onclick="revealAll()">Reveal All Cards</button>
</div>

<script>
  const months = [
    'APRIL 2026', 'MAY 2026', 'DECEMBER 2026', 'JANUARY 2027', 'FEBRUARY 2027', 'FEBRUARY 2027',
    'JUNE 2026', 'JULY 2026', 'AUGUST 2026',
    'SEPTEMBER 2026', 'OCTOBER 2026', 'NOVEMBER 2026'
  ];
  let shuffledMonths = [];
  let tapCounts = {};

  function shuffle(array) {
    let copy = [...array];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function createCards() {
    shuffledMonths = shuffle(months);
    tapCounts = {};
    const container = document.getElementById('scratchContainer');
    container.innerHTML = '';

    for (let i = 0; i < 12; i++) {
      const cardWrapper = document.createElement('div');
      cardWrapper.className = 'card-wrapper';

      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.month = shuffledMonths[i];

      const numberDiv = document.createElement('div');
      numberDiv.className = 'number';
      numberDiv.textContent = i + 1;

      const monthText = document.createElement('div');
      monthText.className = 'hidden-text';
      monthText.textContent = shuffledMonths[i];

      card.appendChild(numberDiv);
      card.appendChild(monthText);

      tapCounts[i] = 0;

      card.addEventListener('click', function () {
        tapCounts[i]++;
        if (tapCounts[i] === 1) {
          card.style.opacity = 0.7;
        } else if (tapCounts[i] === 2) {
          card.style.opacity = 0.4;
        } else if (tapCounts[i] >= 3) {
          card.classList.add('revealed');
          card.style.opacity = 1;
        }
      });

      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = "Winner's name";
      input.className = 'winner-name';

      cardWrapper.appendChild(card);
      cardWrapper.appendChild(input);
      container.appendChild(cardWrapper);
    }
  }

  function resetCards() {
    createCards();
  }

  function revealAll() {
    const cards = document.querySelectorAll('.card');
    cards.forEach(card => {
      card.classList.add('revealed');
      card.style.opacity = 1;
    });
  }

  // Load cards on page load
  createCards();
</script>

</body>
</html>
